<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>お知らせ管理 | GY COMPANY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
  <main class="admin-auth" id="loginView" hidden>
    <form class="admin-auth-card" id="loginForm">
      <div class="admin-brand">GY COMPANY</div>
      <h1>お知らせ管理</h1>
      <p>管理者アカウントでログインしてください。</p>
      <label>ユーザー名<input name="username" autocomplete="username" required></label>
      <label>パスワード<input name="password" type="password" autocomplete="current-password" required></label>
      <button class="admin-btn primary" type="submit">ログイン</button>
      <p class="admin-message" id="loginMessage"></p>
      <p class="admin-small"><a href="admin-setup.html">初期設定</a></p>
    </form>
  </main>

  <main class="admin-shell" id="appView" hidden>
    <aside class="admin-sidebar">
      <div class="admin-sidebar-head">
        <div>
          <div class="admin-brand">GY COMPANY</div>
          <h1>お知らせ管理</h1>
        </div>
        <button class="admin-btn ghost" id="logoutBtn" type="button">ログアウト</button>
      </div>
      <button class="admin-btn primary full" id="newBtn" type="button">新規作成</button>
      <div class="admin-list" id="newsList"></div>
    </aside>

    <section class="admin-editor">
      <form id="newsForm">
        <input type="hidden" name="id">
        <input id="imageUploadInput" type="file" accept="image/*" hidden>
        <input id="fileUploadInput" type="file" hidden>
        <div class="admin-editor-head">
          <div>
            <p class="admin-kicker">NEWS EDITOR</p>
            <h2 id="editorTitle">新規お知らせ</h2>
          </div>
          <div class="admin-actions">
            <a class="admin-btn ghost" href="index.html" target="_blank" rel="noopener">サイト確認</a>
            <button class="admin-btn danger" id="deleteBtn" type="button">削除</button>
            <button class="admin-btn primary" type="submit">保存</button>
          </div>
        </div>

        <div class="admin-grid">
          <label>Slug<input name="slug" placeholder="news-title-2026" required></label>
          <label>公開日<input name="published_at" type="date" required></label>
          <label>状態<select name="status"><option value="draft">下書き</option><option value="published">公開</option></select></label>
        </div>

        <div class="admin-lang-tabs">
          <button type="button" class="active" data-lang-tab="ja">日本語</button>
          <button type="button" data-lang-tab="zh">中文</button>
          <button type="button" data-lang-tab="en">English</button>
        </div>

        <div class="admin-lang-panel active" data-lang-panel="ja">
          <label>タイトル<input name="ja_title" required></label>
          <label>概要<textarea name="ja_excerpt" rows="3"></textarea></label>
          <input type="hidden" name="ja_body">
          <div class="admin-editor-field">
            <div class="admin-field-title">本文</div>
            <div class="quill-editor" data-rich-content="ja"></div>
          </div>
        </div>
        <div class="admin-lang-panel" data-lang-panel="zh">
          <label>标题<input name="zh_title"></label>
          <label>概要<textarea name="zh_excerpt" rows="3"></textarea></label>
          <input type="hidden" name="zh_body">
          <div class="admin-editor-field">
            <div class="admin-field-title">正文</div>
            <div class="quill-editor" data-rich-content="zh"></div>
          </div>
        </div>
        <div class="admin-lang-panel" data-lang-panel="en">
          <label>Title<input name="en_title"></label>
          <label>Excerpt<textarea name="en_excerpt" rows="3"></textarea></label>
          <input type="hidden" name="en_body">
          <div class="admin-editor-field">
            <div class="admin-field-title">Body</div>
            <div class="quill-editor" data-rich-content="en"></div>
          </div>
        </div>

        <section class="attachment-panel">
          <div class="attachment-head">
            <div>
              <h3>アップロード済みファイル</h3>
              <p>本文ツールバーから画像・ファイルを追加できます。お知らせを保存してからアップロードしてください。</p>
            </div>
          </div>
          <div class="attachment-list" id="attachmentList"><p class="admin-small">保存後にアップロードできます。</p></div>
        </section>

        <p class="admin-message" id="editorMessage"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="assets/admin-news.js"></script>
</body>
</html>
