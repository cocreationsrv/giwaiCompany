<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>初期設定 | GY COMPANY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
  <main class="admin-auth">
    <form class="admin-auth-card" id="setupForm">
      <div class="admin-brand">GY COMPANY</div>
      <h1>管理者の初期設定</h1>
      <p>最初の管理者アカウントを作成します。作成後、この設定は自動的に無効になります。</p>
      <label>ユーザー名<input name="username" autocomplete="username" required></label>
      <label>パスワード<input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
      <button class="admin-btn primary" type="submit">管理者を作成</button>
      <p class="admin-message" id="setupMessage"></p>
      <p class="admin-small"><a href="admin-news.html">お知らせ管理へ</a></p>
    </form>
  </main>
  <script>
    const form = document.getElementById("setupForm");
    const message = document.getElementById("setupMessage");

    async function json(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        ...options
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.error || "Request failed");
      return data;
    }

    async function boot() {
      const status = await json("api/admin.php?action=status");
      if (!status.setupRequired) {
        message.textContent = "初期設定は完了しています。お知らせ管理へ移動してください。";
        form.querySelector("button").disabled = true;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "";
      const payload = Object.fromEntries(new FormData(form).entries());
      try {
        await json("api/admin.php?action=setup", { method: "POST", body: JSON.stringify(payload) });
        message.textContent = "管理者を作成しました。お知らせ管理へ移動します。";
        setTimeout(() => { window.location.href = "admin-news.html"; }, 800);
      } catch (error) {
        message.textContent = error.message;
      }
    });

    boot().catch((error) => { message.textContent = error.message; });
  </script>
</body>
</html>
